<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shayari | Mishra ❤️</title>

<link rel="stylesheet" href="shayri.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAV -->
<nav>
    <h2 class="logo">For Mishra ❤️</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
    </ul>
</nav>

<!-- HEADER -->
<section class="header">
    <h1>Our Shayari ❤️</h1>
    <p>Words we never said directly… but felt deeply.</p>

    <div class="tabs">
        <button onclick="filterShayari('mishra')">Mishra's Shayari 🌸</button>
        <button class="active" onclick="filterShayari('mine')">Pathak's Shayari ✨</button>
    </div>
</section>

<!-- SHAYARI CONTAINER -->
<section class="shayari-container">

    <!-- YOUR SHAYARI -->
    <div class="shayari-card mine">
        <p>To puchti hai kya dekhta hu,<br>
        main bas tujhe hi sochta hu ❤️</p>
    </div>

    <div class="shayari-card mine">
        <p>Chal bye bacha 🙂‍↔️<br>
        par dil keh raha ruk ja zara…</p>
    </div>

    <!-- MISHRA SHAYARI -->
    <div class="shayari-card mishra">
        <p>Khamoshi bhi tumhari,<br>
        sabse pyari lagti hai ❤️</p>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>Written with love, felt forever ❤️</p>
</footer>

<!-- JS -->
<script>
function filterShayari(type) {
    const mishra = document.querySelectorAll('.mishra');
    const mine = document.querySelectorAll('.mine');
    const buttons = document.querySelectorAll('.tabs button');

    buttons.forEach(btn => btn.classList.remove('active'));

    if(type === 'mishra'){
        mishra.forEach(card => card.style.display = 'block');
        mine.forEach(card => card.style.display = 'none');
        buttons[0].classList.add('active');
    } else {
        mishra.forEach(card => card.style.display = 'none');
        mine.forEach(card => card.style.display = 'block');
        buttons[1].classList.add('active');
    }
}

// DEFAULT
filterShayari('mine');
</script>

</body>
</html>
