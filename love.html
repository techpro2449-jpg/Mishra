/* ================================
   💖 IMAGE SYSTEM
================================ */
const imagePool = [
    "./img2/L1.jpeg",
    "./img2/L2.jpeg",
    "./img2/L3.jpeg",
    "./img2/L4.jpeg",
    "./img2/L5.jpeg",
    "./img2/L6.jpeg",
    "./img2/L7.jpeg",
    "./img2/L8.jpeg",
    "./img2/L9.jpeg",
    "./img2/L10.jpeg",
    "./img2/L11.jpeg",
    "./img2/L12.jpeg",
    "./img2/L13.jpeg",
    "./img2/L14.jpeg",
    "./img2/L15.jpeg",
    "./img2/L16.jpeg",
    "./img2/L17.jpeg",
    "./img2/L18.jpeg",
    "./img2/L19.jpeg",
    "./img2/L20.jpeg"
];

function generateShuffledImages() {

    let expanded = [];

    imagePool.forEach(img => {
        for (let i = 0; i < 20; i++) {
            expanded.push(img);
        }
    });

    // Fisher-Yates Shuffle
    for (let i = expanded.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [expanded[i], expanded[j]] = [expanded[j], expanded[i]];
    }

    return expanded;
}

const shuffledImages = generateShuffledImages();

/* ================================
   💖 DOM ELEMENTS
================================ */

const grid = document.getElementById("reasons-grid");
const container = document.getElementById("hearts-bg");
const sideNav = document.getElementById("sideNav");

const MAX_HEARTS = 25;

/* ================================
   💖 RENDER CARDS
================================ */

function renderReasons() {

    const fragment = document.createDocumentFragment();

    reasons.forEach((reason, index) => {

        const card = document.createElement("div");
        card.className = "card";
        card.id = `reason-${reason.id}`;

        const img = shuffledImages[index];

        card.innerHTML = `
            <div class="card-content">
                <span class="card-num">Reason #${reason.id}</span>
                <div class="card-title">${reason.title}</div>
                <div class="card-desc">${reason.desc}</div>
            </div>

            <div class="card-img" style="background-image:url('${img}')"></div>
        `;

        fragment.appendChild(card);
    });

    grid.appendChild(fragment);
}

/* ================================
   💖 SIDE NAV
================================ */

function buildSideNav() {

    const jumpPoints = [1];

    for (let i = 20; i <= reasons.length; i += 20) {
        jumpPoints.push(i);
    }

    sideNav.innerHTML = jumpPoints.map(num => `
        <button class="nav-dot" data-id="${num}">${num}</button>
    `).join("");

    document.querySelectorAll(".nav-dot").forEach(btn => {
        btn.addEventListener("click", () => {
            document.getElementById(`reason-${btn.dataset.id}`)
                ?.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
        });
    });
}

/* ================================
   💖 SCROLL ANIMATION
================================ */

function setupObservers() {

    const cards = document.querySelectorAll(".card");
    const dots = document.querySelectorAll(".nav-dot");

    const observer = new IntersectionObserver(entries => {

        entries.forEach(entry => {

            if (entry.isIntersecting) {
                entry.target.classList.add("visible");
            }

            const id = entry.target.id.split("-")[1];

            if (entry.isIntersecting) {
                dots.forEach(dot => {
                    dot.classList.toggle(
                        "active",
                        dot.dataset.id === id
                    );
                });
            }
        });

    }, { threshold: 0.5 });

    cards.forEach(card => observer.observe(card));
}

/* ================================
   💖 HEART ANIMATION
================================ */

function createHeart() {

    if (container.children.length > MAX_HEARTS) {
        container.removeChild(container.firstChild);
    }

    const heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.textContent = "❤️";

    const x = Math.random() * window.innerWidth;

    heart.style.transform = `translate3d(${x}px, 100vh, 0)`;

    container.appendChild(heart);

    requestAnimationFrame(() => {
        heart.style.transform =
            `translate3d(${x}px, -120vh, 0) rotate(360deg)`;
        heart.style.opacity = "0";
    });

    setTimeout(() => heart.remove(), 5000);
}

/* ================================
   💖 INIT
================================ */

renderReasons();
buildSideNav();
setupObservers();

setInterval(createHeart, 900);
